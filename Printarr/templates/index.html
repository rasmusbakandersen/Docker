<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Printarr</title>
<link rel="icon" href="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/epson-scan.png" type="image/png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0c0e11;
    --surface: #14171c;
    --surface-2: #1a1e24;
    --surface-3: #21262d;
    --border: #2d333b;
    --border-hover: #444c56;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #636c76;
    --accent: #3fb950;
    --accent-dim: rgba(63, 185, 80, 0.15);
    --warn: #d29922;
    --warn-dim: rgba(210, 153, 34, 0.15);
    --error: #f85149;
    --error-dim: rgba(248, 81, 73, 0.15);
    --blue: #58a6ff;
    --blue-dim: rgba(88, 166, 255, 0.12);
    --purple: #bc8cff;
    --purple-dim: rgba(188, 140, 255, 0.12);
    --radius: 6px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--bg);
  }
  .status-pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  .status-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-ok { background: var(--accent-dim); color: var(--accent); }
  .status-ok .dot { background: var(--accent); }
  .status-degraded { background: var(--warn-dim); color: var(--warn); }
  .status-degraded .dot { background: var(--warn); }
  .status-error { background: var(--error-dim); color: var(--error); }
  .status-error .dot { background: var(--error); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 24px;
    gap: 0;
  }
  .tab {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    padding: 12px 20px;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  main { max-width: 960px; margin: 0 auto; padding: 24px; }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  select, input[type="number"], input[type="text"] {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select { cursor: pointer; }
  option { background: var(--surface-2); }

  .checkbox-row {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 13px;
  }
  input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px; height: 16px; cursor: pointer;
  }

  .btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border: 1px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
  .btn-secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--border-hover); background: var(--surface-3); }
  .btn-danger { background: var(--error-dim); color: var(--error); border-color: transparent; }
  .btn-danger:hover { background: rgba(248,81,73,0.25); }
  .btn-paperless { background: var(--purple-dim); color: var(--purple); border-color: transparent; }
  .btn-paperless:hover { background: rgba(188,140,255,0.25); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .file-drop {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .file-drop:hover, .file-drop.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .file-drop input { display: none; }
  .file-drop-text { font-family: var(--mono); font-size: 13px; color: var(--text-dim); }
  .file-drop-text strong { color: var(--accent); }
  .file-name { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-top: 8px; }

  .scan-list { display: flex; flex-direction: column; gap: 8px; }
  .scan-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s;
  }
  .scan-item:hover { border-color: var(--border-hover); }
  .scan-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .scan-name { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scan-meta { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .scan-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .printer-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
  }
  .printer-icon {
    width: 36px; height: 36px;
    background: var(--blue-dim);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .printer-name { font-family: var(--mono); font-size: 14px; font-weight: 600; }
  .printer-status { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

  .job-item {
    font-family: var(--mono); font-size: 12px;
    padding: 8px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .toast-container {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 1000;
  }
  .toast {
    font-family: var(--mono); font-size: 12px;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid;
    animation: toast-in 0.25s ease-out;
    max-width: 360px;
  }
  .toast-success { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .toast-error { background: var(--error-dim); border-color: var(--error); color: var(--error); }
  .toast-info { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
  @keyframes toast-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center; padding: 40px;
    color: var(--text-muted);
    font-family: var(--mono); font-size: 13px;
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    main { padding: 16px; }
    header { padding: 12px 16px; }
    .tabs { padding: 0 16px; }
    .tab { padding: 10px 14px; font-size: 12px; }
    .scan-item { flex-direction: column; align-items: flex-start; gap: 10px; }
    .scan-actions { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⎙</div>
    Printarr
  </div>
  <div id="health-status" class="status-pill status-ok">
    <span class="dot"></span>
    <span id="health-text">checking…</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-panel="scan">⎘ Scan</button>
  <button class="tab" data-panel="print">⎙ Print</button>
  <button class="tab" data-panel="history">▤ History</button>
  <button class="tab" data-panel="status">◉ Status</button>
</div>

<main>

  <!-- ═══════════ SCAN PANEL ═══════════ -->
  <div id="panel-scan" class="panel active">
    <div class="card">
      <div class="card-title">Scanner Settings</div>
      <div class="form-row">
        <div class="form-group">
          <label>Scanner</label>
          <select id="scan-device"><option value="">Auto-detect</option></select>
        </div>
        <div class="form-group">
          <label>Resolution (DPI)</label>
          <select id="scan-resolution">
            <option value="150">150</option>
            <option value="300" selected>300</option>
            <option value="600">600</option>
            <option value="1200">1200</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mode</label>
          <select id="scan-mode">
            <option value="Color">Color</option>
            <option value="Gray">Grayscale</option>
            <option value="Lineart">Lineart</option>
          </select>
        </div>
        <div class="form-group">
          <label>Format</label>
          <select id="scan-format">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="tiff">TIFF</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Source</label>
          <select id="scan-source">
            <option value="Flatbed">Flatbed</option>
            <option value="ADF">ADF (Auto Document Feeder)</option>
          </select>
        </div>
      </div>
      <div style="margin-top: 8px;">
        <button class="btn btn-primary" id="btn-scan" onclick="startScan()">⎘ Start Scan</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ PRINT PANEL ═══════════ -->
  <div id="panel-print" class="panel">
    <div class="card">
      <div class="card-title">Print Document</div>
      <div class="file-drop" id="print-drop" onclick="document.getElementById('print-file').click()">
        <input type="file" id="print-file" accept=".pdf,.ps,.txt,.png,.jpg,.jpeg,.doc,.docx" />
        <div class="file-drop-text">
          Drop a file here or <strong>click to browse</strong><br>
          <span style="font-size: 11px; color: var(--text-muted);">PDF, images, text files</span>
        </div>
        <div class="file-name" id="print-file-name"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Printer</label>
          <select id="print-printer"><option value="">Default</option></select>
        </div>
        <div class="form-group">
          <label>Copies</label>
          <input type="number" id="print-copies" value="1" min="1" max="99" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Pages</label>
          <input type="text" id="print-pages" placeholder="All (e.g. 1-5, 8)" />
        </div>
        <div class="form-group" style="justify-content: flex-end; gap: 12px;">
          <div class="checkbox-row">
            <input type="checkbox" id="print-duplex" />
            <label for="print-duplex" style="text-transform:none; font-size:13px;">Duplex</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="print-color" checked />
            <label for="print-color" style="text-transform:none; font-size:13px;">Color</label>
          </div>
        </div>
      </div>
      <div style="margin-top: 8px;">
        <button class="btn btn-primary" id="btn-print" onclick="startPrint()">⎙ Print</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Active Jobs</div>
      <div id="jobs-list" class="empty-state">No active jobs</div>
    </div>
  </div>

  <!-- ═══════════ HISTORY PANEL ═══════════ -->
  <div id="panel-history" class="panel">
    <div class="card">
      <div class="card-title">Saved Scans</div>
      <div id="scans-list" class="scan-list">
        <div class="empty-state">No scans yet</div>
      </div>
    </div>
  </div>

  <!-- ═══════════ STATUS PANEL ═══════════ -->
  <div id="panel-status" class="panel">
    <div class="card">
      <div class="card-title">Printers</div>
      <div id="printers-list" class="empty-state">Checking…</div>
    </div>
    <div class="card">
      <div class="card-title">Scanners</div>
      <div id="scanners-list" class="empty-state">Checking…</div>
    </div>
    <div class="card">
      <div class="card-title">Service Health</div>
      <div id="health-detail" style="font-family:var(--mono);font-size:13px;color:var(--text-dim);">Checking…</div>
    </div>
  </div>
</main>

<div class="toast-container" id="toasts"></div>

<script>
const API = '';

function toast(msg, type = 'info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 4000);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    if (tab.dataset.panel === 'history') loadScans();
    if (tab.dataset.panel === 'status') loadStatus();
    if (tab.dataset.panel === 'print') loadJobs();
  });
});

const drop = document.getElementById('print-drop');
const fileInput = document.getElementById('print-file');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('drag-over');
  if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; showFileName(); }
});
fileInput.addEventListener('change', showFileName);
function showFileName() {
  const name = fileInput.files[0]?.name || '';
  document.getElementById('print-file-name').textContent = name ? `✓ ${name}` : '';
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

async function checkHealth() {
  try {
    const r = await fetch(API + '/api/health');
    const d = await r.json();
    const pill = document.getElementById('health-status');
    const text = document.getElementById('health-text');
    pill.className = 'status-pill ' + (d.status === 'ok' ? 'status-ok' : 'status-degraded');
    text.textContent = d.status === 'ok' ? 'all systems go' : 'degraded';
  } catch {
    document.getElementById('health-status').className = 'status-pill status-error';
    document.getElementById('health-text').textContent = 'offline';
  }
}

async function loadScanners() {
  try {
    const r = await fetch(API + '/api/scanners');
    const d = await r.json();
    const sel = document.getElementById('scan-device');
    d.scanners?.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.device;
      opt.textContent = s.description || s.device;
      sel.appendChild(opt);
    });
  } catch {}
}

async function loadPrinters() {
  try {
    const r = await fetch(API + '/api/printers');
    const d = await r.json();
    const sel = document.getElementById('print-printer');
    d.printers?.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name + (d.default === p.name ? ' (default)' : '');
      sel.appendChild(opt);
    });
  } catch {}
}

async function startScan() {
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Scanning…';

  const form = new FormData();
  form.append('device', document.getElementById('scan-device').value);
  form.append('resolution', document.getElementById('scan-resolution').value);
  form.append('mode', document.getElementById('scan-mode').value);
  form.append('format', document.getElementById('scan-format').value);
  form.append('source', document.getElementById('scan-source').value);

  try {
    const r = await fetch(API + '/api/scan', { method: 'POST', body: form });
    const d = await r.json();
    if (d.success) {
      toast('Scan complete: ' + d.filename, 'success');
    } else {
      toast(d.detail || 'Scan failed', 'error');
    }
  } catch (e) {
    toast('Scan error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⎘ Start Scan';
  }
}

async function startPrint() {
  const file = fileInput.files[0];
  if (!file) { toast('Select a file first', 'error'); return; }

  const btn = document.getElementById('btn-print');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Sending…';

  const form = new FormData();
  form.append('file', file);
  const printer = document.getElementById('print-printer').value;
  if (printer) form.append('printer', printer);
  form.append('copies', document.getElementById('print-copies').value);
  form.append('duplex', document.getElementById('print-duplex').checked);
  form.append('color', document.getElementById('print-color').checked);
  const pages = document.getElementById('print-pages').value.trim();
  if (pages) form.append('pages', pages);

  try {
    const r = await fetch(API + '/api/print', { method: 'POST', body: form });
    const d = await r.json();
    if (d.success) {
      toast('Print job sent: ' + (d.job_id || 'queued'), 'success');
      fileInput.value = '';
      document.getElementById('print-file-name').textContent = '';
      loadJobs();
    } else {
      toast(d.detail || 'Print failed', 'error');
    }
  } catch (e) {
    toast('Print error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⎙ Print';
  }
}

async function loadJobs() {
  try {
    const r = await fetch(API + '/api/jobs');
    const d = await r.json();
    const el = document.getElementById('jobs-list');
    if (!d.jobs?.length) { el.innerHTML = '<div class="empty-state">No active jobs</div>'; return; }
    el.innerHTML = d.jobs.map(j => {
      const id = j.split(' ')[0] || j;
      return `<div class="job-item"><span>${j}</span><button class="btn btn-danger btn-sm" onclick="cancelJob('${id}')">Cancel</button></div>`;
    }).join('');
  } catch {}
}

async function cancelJob(id) {
  try {
    await fetch(API + '/api/jobs/' + encodeURIComponent(id) + '/cancel', { method: 'POST' });
    toast('Job cancelled', 'success');
    loadJobs();
  } catch (e) { toast('Cancel failed', 'error'); }
}

async function loadScans() {
  try {
    const r = await fetch(API + '/api/scans');
    const d = await r.json();
    const el = document.getElementById('scans-list');
    if (!d.scans?.length) { el.innerHTML = '<div class="empty-state">No scans yet</div>'; return; }
    el.innerHTML = d.scans.map(s => `
      <div class="scan-item">
        <div class="scan-info">
          <div class="scan-name">${s.filename}</div>
          <div class="scan-meta">${fmtSize(s.size)} · ${new Date(s.created).toLocaleString()}</div>
        </div>
        <div class="scan-actions">
          <button class="btn btn-paperless btn-sm" onclick="sendToPaperless('${s.filename}')" title="Send to Paperless-NGX">📄 Paperless</button>
          <a href="${API}${s.path}" download class="btn btn-secondary btn-sm">↓ Download</a>
          <button class="btn btn-danger btn-sm" onclick="deleteScan('${s.filename}')">✕</button>
        </div>
      </div>
    `).join('');
  } catch {}
}

async function deleteScan(name) {
  if (!confirm('Delete ' + name + '?')) return;
  try {
    await fetch(API + '/api/scans/' + encodeURIComponent(name), { method: 'DELETE' });
    toast('Deleted', 'success');
    loadScans();
  } catch { toast('Delete failed', 'error'); }
}

async function sendToPaperless(name) {
  try {
    const r = await fetch(API + '/api/scans/' + encodeURIComponent(name) + '/paperless', { method: 'POST' });
    const d = await r.json();
    if (d.success) {
      toast('Sent to Paperless-NGX', 'success');
    } else {
      toast(d.detail || 'Failed to send to Paperless', 'error');
    }
  } catch (e) {
    toast('Paperless error: ' + e.message, 'error');
  }
}

async function loadStatus() {
  try {
    const r = await fetch(API + '/api/printers');
    const d = await r.json();
    const el = document.getElementById('printers-list');
    if (!d.printers?.length) { el.innerHTML = '<div class="empty-state">No printers found</div>'; }
    else {
      el.innerHTML = d.printers.map(p => `
        <div class="printer-item">
          <div class="printer-icon">⎙</div>
          <div>
            <div class="printer-name">${p.name}${d.default === p.name ? ' ★' : ''}</div>
            <div class="printer-status">${p.status}</div>
          </div>
        </div>
      `).join('');
    }
  } catch { document.getElementById('printers-list').innerHTML = '<div class="empty-state">Could not fetch printers</div>'; }

  try {
    const r = await fetch(API + '/api/scanners');
    const d = await r.json();
    const el = document.getElementById('scanners-list');
    if (!d.scanners?.length) { el.innerHTML = '<div class="empty-state">No scanners found</div>'; }
    else {
      el.innerHTML = d.scanners.map(s => `
        <div class="printer-item">
          <div class="printer-icon" style="background:var(--accent-dim);color:var(--accent);">⎘</div>
          <div>
            <div class="printer-name">${s.description || 'Scanner'}</div>
            <div class="printer-status">${s.device}</div>
          </div>
        </div>
      `).join('');
    }
  } catch { document.getElementById('scanners-list').innerHTML = '<div class="empty-state">Could not fetch scanners</div>'; }

  try {
    const r = await fetch(API + '/api/health');
    const d = await r.json();
    document.getElementById('health-detail').innerHTML = `
      CUPS: <span style="color:${d.cups ? 'var(--accent)' : 'var(--error)'}">${d.cups ? '● online' : '○ offline'}</span><br>
      SANE: <span style="color:${d.sane ? 'var(--accent)' : 'var(--error)'}">${d.sane ? '● online' : '○ offline'}</span><br>
      Paperless: <span style="color:${d.paperless_consume ? 'var(--accent)' : 'var(--error)'}">${d.paperless_consume ? '● mounted' : '○ not mounted'}</span>
    `;
  } catch {}
}

checkHealth();
loadScanners();
loadPrinters();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
