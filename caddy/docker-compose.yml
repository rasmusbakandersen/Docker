services:
  caddy:
    image: caddybuilds/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
      - "2019:2019"
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
    dns:
      - 1.1.1.1
      - 1.0.0.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ./caddy_data:/data:z
      - ./caddy_config:/config:z
      - ./caddy_logs:/var/log/caddy:z
    networks:
      - gitea_network
      - arr-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep caddy || exit 1"]
      interval: 90s
      timeout: 15s
      retries: 2
      start_period: 30s

networks:
  gitea_network:
    external: true
  arr-network:
    external: true
