services:
  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GLANCES_OPT=-w
    ports:
      - "61208:61208"
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    mem_reservation: 64m
